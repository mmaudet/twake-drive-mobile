appId: com.linagora.twakedrive
tags:
  - inapp
env:
  FOLDER_NAME: 'E2E-smoke'
---
# Real CREATE + DELETE round-trip, scoped STRICTLY to a throwaway folder.
#
# ⚠️ SAFETY: the target is selected with a long-press on its EXACT name, NEVER a
# `rightOf` menu selector. `rightOf` can resolve to the WRONG row and delete a
# real folder (it did, during bring-up). Long-press on the exact ${FOLDER_NAME}
# selects only that folder; bulk-delete then acts on the selection only. The
# confirm button is targeted by testID (confirm-delete-submit), not the ambiguous
# "Supprimer" text (shared with the app-bar action + row menu).
- runFlow: ../../subflows/openDrive.yaml
# create
- tapOn:
    id: 'drive-fab'
- tapOn: 'Nouveau dossier'
- inputText: '${FOLDER_NAME}'
- pressKey: Enter
- extendedWaitUntil:
    visible: '${FOLDER_NAME}'
    timeout: 12000
# delete via selection mode (long-press selects ONLY this exact folder)
- longPressOn:
    text: '${FOLDER_NAME}'
- tapOn:
    id: 'selection-delete'
- waitForAnimationToEnd
- tapOn:
    id: 'confirm-delete-submit'
- extendedWaitUntil:
    notVisible: '${FOLDER_NAME}'
    timeout: 12000
