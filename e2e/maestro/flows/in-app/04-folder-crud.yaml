appId: com.linagora.twakedrive
tags:
  - inapp
---
# Teste le PARCOURS de création (FAB → « Nouveau dossier » → dialog) SANS muter
# le drive → idempotent, pas de faux positif. Cross-platform (testIDs).
# On s'arrête au dialog ouvert (champ nom visible) ; le launchApp du flow suivant
# réinitialise. Le bouton submit est masqué par le clavier sur Android donc non
# asserté ici.
#
# ⚠️ Round-trip create+delete RÉEL reporté : la CRÉATION marche (dossier créé),
# mais la SUPPRESSION ne se déclenche PAS via tap synthétique (maestro/adb/point)
# alors qu'elle marche À LA MAIN — l'onPress du bouton du dialog Paper n'est pas
# activé. Cross-platform. cf. DEVICE-NOTES pour l'investigation.
- runFlow: ../../subflows/openDrive.yaml
- tapOn:
    id: 'drive-fab'
- tapOn: 'Nouveau dossier'
- assertVisible:
    id: 'create-folder-name-input'
