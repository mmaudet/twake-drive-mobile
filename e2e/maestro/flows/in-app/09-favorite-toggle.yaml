appId: com.linagora.twakedrive
tags:
  - inapp
env:
  FOLDER: 'E2Efav'
  MENU_SUFFIX: ''
---
# Favori : ajout → présent dans Favoris → retrait → ABSENT de Favoris (valide le fix
# refetch). Throwaway sans tiret (l'inputText iOS mange le '-'). Menu ciblé par
# folder-actions:<nom> ; sur iOS le suffixe MENU_SUFFIX=-container-outer-layer est
# passé par run-ios.sh (le testID nu y est ambigu).
- runFlow: ../../subflows/openDrive.yaml
- tapOn: { id: 'drive-fab' }
- tapOn: 'Nouveau dossier'
- inputText: '${FOLDER}'
- pressKey: Enter
- extendedWaitUntil: { visible: '${FOLDER}', timeout: 12000 }
- tapOn: { id: 'folder-actions:${FOLDER}${MENU_SUFFIX}' }
- tapOn: 'Ajouter aux favoris'
- tapOn: { text: 'Favoris.*' }
- extendedWaitUntil: { visible: '${FOLDER}', timeout: 10000 }
- tapOn: { id: 'folder-actions:${FOLDER}${MENU_SUFFIX}' }
- tapOn: 'Retirer des favoris'
- extendedWaitUntil: { notVisible: '${FOLDER}', timeout: 10000 }
- tapOn: { text: 'Mon Drive.*' }
- tapOn: { id: 'folder-actions:${FOLDER}${MENU_SUFFIX}' }
- tapOn: 'Supprimer'
- waitForAnimationToEnd
- tapOn: { id: 'confirm-delete-submit' }
