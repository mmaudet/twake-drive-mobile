appId: com.linagora.twakedrive
tags:
  - inapp
env:
  SEARCH_QUERY: 'Rapport'
---
# Recherche joignable + saisie (testIDs cross-platform). Assertion sur résultat
# serveur volontairement omise (paginé + .includes() → non déterministe).
- runFlow: ../../subflows/openDrive.yaml
- tapOn:
    id: 'appbar-search-button'
- assertVisible:
    id: 'search-input'
- inputText: '${SEARCH_QUERY}'
- assertVisible: '${SEARCH_QUERY}'
