# Default Robolectric config for this module.
#
# The manifest's real Application (com.linagora.twakedrive.MainApplication) bootstraps
# React Native / SoLoader native-library loading in onCreate(), which throws a
# NullPointerException under Robolectric's simulated environment (no real native lib dir to
# resolve). Unit tests here (DocumentMapper, DocumentsProvider, etc.) don't need a real RN host,
# so default every Robolectric test in this module to the plain android.app.Application instead.
# A future test that specifically needs MainApplication's behavior can still override this with
# its own @Config(application = ...).
application=android.app.Application
